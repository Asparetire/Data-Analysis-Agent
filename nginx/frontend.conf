server {
    listen 80;
    server_name _;

    # gzip — small win for JSON API responses and JS bundles
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. TLS is terminated upstream (cloud LB / Cloudflare),
    # so no Strict-Transport-Security here — the upstream adds it.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    # API → backend. X-Request-ID is forwarded so the backend's
    # RequestIdMiddleware picks up the same id (or generates one if absent).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;

        # SSE: don't buffer /chat/stream. The backend sets
        # X-Accel-Buffering: no on the response too, this is belt-and-suspenders.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — any non-file route serves index.html so client-side
    # routing (React Router or whatever) takes over on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
