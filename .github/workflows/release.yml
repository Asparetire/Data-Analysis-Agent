name: Release

# Triggered by pushing a `v*` tag (e.g. `v0.2.0`). Builds the backend and
# nginx images, pushes them to GitHub Container Registry (ghcr.io) tagged
# with both the version (without the leading `v`) and `latest`.
#
# The images are public by default — flip the repository visibility on
# ghcr.io to private if you need a private registry. To revoke access,
# delete the packages at https://github.com/users/<owner>/packages.
#
# Required secrets:
#   none — GITHUB_TOKEN is used automatically and has package:write scope.
#
# To cut a release locally:
#   git tag v0.2.0
#   git push origin v0.2.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: rel
        run: |
          # Strip the leading 'v' from the tag for the image tag.
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.rel.outputs.owner }}/data-analysis-agent-backend:${{ steps.rel.outputs.version }}
            ghcr.io/${{ steps.rel.outputs.owner }}/data-analysis-agent-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push nginx (frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.rel.outputs.owner }}/data-analysis-agent-nginx:${{ steps.rel.outputs.version }}
            ghcr.io/${{ steps.rel.outputs.owner }}/data-analysis-agent-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.rel.outputs.version, '-') }}
